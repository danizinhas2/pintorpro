<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PintorPRO</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PintorPRO" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: #F5F5F5; font-family: 'DM Sans', sans-serif; color: #111; }
    input, textarea, select { font-family: 'DM Sans', sans-serif; }
    input:focus, textarea:focus { outline: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .no-print { display: none !important; }
      body { background: white !important; margin: 0 !important; padding: 0 !important; }
      #orcamento-render { border-radius: 0 !important; border: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect } = React;

const PINTOR_KEY = "pintorpro_v3_pintor";
const ORCAMENTOS_KEY = "pintorpro_v3_orcamentos";
const PINTOR_VAZIO = { nome: "", cpfCnpj: "", telefone: "", email: "" };

const AMBIENTES = [
  { label: "Quarto", grupo: "Casa" },
  { label: "Sala", grupo: "Casa" },
  { label: "Cozinha", grupo: "Casa" },
  { label: "Banheiro", grupo: "Casa" },
  { label: "Área de Serviço", grupo: "Casa" },
  { label: "Garagem", grupo: "Casa" },
  { label: "Varanda", grupo: "Casa" },
  { label: "Corredor", grupo: "Casa" },
  { label: "Escada", grupo: "Casa" },
  { label: "Fachada", grupo: "Externo" },
  { label: "Portão", grupo: "Externo" },
  { label: "Muro", grupo: "Externo" },
  { label: "Galpão", grupo: "Industrial" },
  { label: "Piso Industrial", grupo: "Industrial" },
  { label: "Estrutura Metálica", grupo: "Industrial" },
  { label: "Telhado", grupo: "Industrial" },
  { label: "Parede Externa", grupo: "Industrial" },
];

let seq = 1;
const uid = () => seq++;
const brl = v => Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const hojeStr = () => new Date().toLocaleDateString("pt-BR");
const addDias = (n) => {
  const d = new Date();
  d.setDate(d.getDate() + (parseInt(n)||15));
  return d.toLocaleDateString("pt-BR");
};
const orcVazio = () => ({
  id: Date.now(),
  cliente: "", endereco: "", descricao: "", validade: "15",
  inclMaterial: true, inclMao: true, inclNF: false,
  itens: [], criadoEm: hojeStr()
});

function App() {
  const [pintor, setPintor] = useState(() => {
    try { return JSON.parse(localStorage.getItem(PINTOR_KEY)) || PINTOR_VAZIO; } catch { return PINTOR_VAZIO; }
  });
  const [pintorSalvo, setPintorSalvo] = useState(() => !!localStorage.getItem(PINTOR_KEY));
  const [editPintor, setEditPintor] = useState(() => !localStorage.getItem(PINTOR_KEY));
  const [pintorTemp, setPintorTemp] = useState(pintor);

  const [orc, setOrc] = useState(orcVazio());
  const [busca, setBusca] = useState("");
  const [showSug, setShowSug] = useState(false);

  const [tela, setTela] = useState("form");
  const [toast, setToast] = useState(null);
  const [imgUrl, setImgUrl] = useState(null);
  const [gerando, setGerando] = useState(false);

  // Lista de orçamentos salvos
  const [orcamentos, setOrcamentos] = useState(() => {
    try { return JSON.parse(localStorage.getItem(ORCAMENTOS_KEY)) || []; } catch { return []; }
  });

  const total = orc.itens.reduce((s,i) => s + ((parseFloat(i.valor)||0) * (parseInt(i.qtd)||1)), 0);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const salvarPintor = () => {
    localStorage.setItem(PINTOR_KEY, JSON.stringify(pintorTemp));
    setPintor(pintorTemp); setPintorSalvo(true); setEditPintor(false);
    showToast("Dados salvos ✓");
    if (tela === "pintor") setTela("form");
  };

  const limparPintor = () => {
    if (!confirm("Remover seus dados salvos?")) return;
    localStorage.removeItem(PINTOR_KEY);
    setPintor(PINTOR_VAZIO); setPintorTemp(PINTOR_VAZIO);
    setPintorSalvo(false); setEditPintor(true);
    showToast("Dados removidos");
  };

  const addItem = (label) => {
    setOrc(o => ({ ...o, itens: [...o.itens, { id: uid(), descricao: label, qtd: "1", valor: "" }] }));
    setBusca(""); setShowSug(false);
  };

  const updateItem = (id, field, value) => {
    setOrc(o => ({ ...o, itens: o.itens.map(it => it.id === id ? { ...it, [field]: value } : it) }));
  };

  const removeItem = (id) => {
    setOrc(o => ({ ...o, itens: o.itens.filter(it => it.id !== id) }));
  };

  const novoOrcamento = () => {
    setOrc(orcVazio()); setTela("form"); setImgUrl(null);
    showToast("Novo orçamento ✓");
  };

  const salvarOrcamento = () => {
    const lista = orcamentos.filter(o => o.id !== orc.id);
    const atualizado = { ...orc, criadoEm: hojeStr() };
    const nova = [atualizado, ...lista];
    setOrcamentos(nova);
    localStorage.setItem(ORCAMENTOS_KEY, JSON.stringify(nova));
    showToast("Orçamento salvo ✓");
  };

  const carregarOrcamento = (o) => {
    setOrc(o); setTela("form"); setImgUrl(null);
    showToast(`Orçamento de ${o.cliente || "sem nome"} carregado ✓`);
  };

  const excluirOrcamento = (id) => {
    if (!confirm("Excluir este orçamento?")) return;
    const nova = orcamentos.filter(o => o.id !== id);
    setOrcamentos(nova);
    localStorage.setItem(ORCAMENTOS_KEY, JSON.stringify(nova));
    showToast("Excluído ✓");
  };

  const gerarImagem = async () => {
    setGerando(true);
    showToast("Gerando imagem...");
    try {
      const el = document.getElementById("orcamento-render");
      const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#fff", useCORS: true });
      setImgUrl(canvas.toDataURL("image/jpeg", 0.97));
      showToast("Pronto! Segure a imagem para salvar ✓");
    } catch(e) { showToast("Erro ao gerar imagem"); }
    setGerando(false);
  };

  const sugestoes = AMBIENTES.filter(a => busca === "" || a.label.toLowerCase().includes(busca.toLowerCase()));
  const grupos = [...new Set(sugestoes.map(a => a.grupo))];

  const inp = { width: "100%", padding: "13px 15px", borderRadius: 12, border: "1.5px solid #E8E8E8", fontSize: 15, background: "#fff", color: "#111" };

  return (
    <div style={{ minHeight: "100vh", background: "#F5F5F5" }}>

      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#111", color: "#fff", padding: "12px 22px", borderRadius: 100, fontSize: 14, fontWeight: 500, zIndex: 9999, whiteSpace: "nowrap", boxShadow: "0 4px 24px rgba(0,0,0,0.2)" }}>{toast}</div>
      )}

      {/* MODAL IMAGEM */}
      {imgUrl && (
        <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 9000, display: "flex", flexDirection: "column" }}>
          <div style={{ background: "#111", padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 16 }}>Orçamento gerado</div>
              <div style={{ color: "#888", fontSize: 12, marginTop: 2 }}>Segure a imagem → Salvar</div>
            </div>
            <button onClick={() => setImgUrl(null)} style={{ background: "#222", border: "none", color: "#fff", width: 36, height: 36, borderRadius: 10, fontSize: 20, cursor: "pointer" }}>×</button>
          </div>
          <div style={{ background: "#fff", padding: "10px 16px", display: "flex", gap: 10 }}>
            <a href="https://wa.me/" style={{ flex: 1, background: "#25D366", color: "#fff", borderRadius: 10, padding: "11px", fontSize: 14, fontWeight: 700, textAlign: "center", textDecoration: "none", display: "block" }}>💬 WhatsApp</a>
            <button onClick={() => setImgUrl(null)} style={{ flex: 1, background: "#111", color: "#fff", border: "none", borderRadius: 10, padding: "11px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>← Voltar</button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
            <img src={imgUrl} alt="Orçamento" style={{ width: "100%", borderRadius: 8, display: "block" }} />
            <div style={{ textAlign: "center", marginTop: 12, color: "#666", fontSize: 13 }}>👆 Segure a imagem e toque em "Salvar imagem"</div>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div className="no-print" style={{ background: "#111", padding: "0 16px", display: "flex", justifyContent: "space-between", alignItems: "center", height: 56, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 20 }}>🖌️</span>
          <span style={{ fontFamily: "'DM Serif Display', serif", color: "#fff", fontSize: 20 }}>PintorPRO</span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {[["form","📋"],["salvos","📁"],["pintor","👷"]].map(([t, icon]) => (
            <button key={t} onClick={() => setTela(t)} style={{
              background: tela === t ? "#fff" : "transparent",
              color: tela === t ? "#111" : "#666",
              border: "1px solid #333", borderRadius: 8,
              padding: "6px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer"
            }}>{icon}</button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 600, margin: "0 auto", padding: "20px 16px 100px" }}>

        {/* ===== TELA: DADOS DO PINTOR ===== */}
        {tela === "pintor" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#111" }}>Seus dados</div>
              <div style={{ color: "#888", fontSize: 14, marginTop: 4 }}>Salvos uma vez, usados em todos os orçamentos</div>
            </div>
            {pintorSalvo && !editPintor ? (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E8E8", overflow: "hidden" }}>
                <div style={{ padding: "20px 20px 0" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "#111", marginBottom: 4 }}>{pintor.nome || "—"}</div>
                  <div style={{ color: "#666", fontSize: 14, marginBottom: 16 }}>{pintor.cpfCnpj || ""}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, paddingBottom: 20, borderBottom: "1px solid #F0F0F0" }}>
                    <div><div style={{ fontSize: 11, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>Telefone</div><div style={{ fontSize: 15, fontWeight: 600 }}>{pintor.telefone || "—"}</div></div>
                    <div><div style={{ fontSize: 11, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>E-mail</div><div style={{ fontSize: 14, fontWeight: 500, wordBreak: "break-all" }}>{pintor.email || "—"}</div></div>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr" }}>
                  <button onClick={() => { setPintorTemp(pintor); setEditPintor(true); }} style={{ padding: "16px", background: "none", border: "none", borderRight: "1px solid #F0F0F0", fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#111" }}>✏️ Editar</button>
                  <button onClick={limparPintor} style={{ padding: "16px", background: "none", border: "none", fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#FF3B30" }}>🗑️ Apagar</button>
                </div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {[{label:"Nome ou empresa",key:"nome",ph:"Carlos Silva Pinturas"},{label:"CPF ou CNPJ",key:"cpfCnpj",ph:"000.000.000-00"},{label:"WhatsApp / Telefone",key:"telefone",ph:"(11) 99999-9999"},{label:"E-mail (opcional)",key:"email",ph:"seu@email.com"}].map(f => (
                  <div key={f.key}>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#666", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>{f.label}</label>
                    <input value={pintorTemp[f.key]} onChange={e => setPintorTemp({...pintorTemp, [f.key]: e.target.value})} placeholder={f.ph} style={inp} />
                  </div>
                ))}
                <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                  <button onClick={salvarPintor} style={{ flex: 1, background: "#111", color: "#fff", border: "none", borderRadius: 12, padding: "15px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Salvar dados</button>
                  {pintorSalvo && <button onClick={() => setEditPintor(false)} style={{ flex: 1, background: "#fff", color: "#111", border: "1.5px solid #E0E0E0", borderRadius: 12, padding: "15px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>Cancelar</button>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ===== TELA: ORÇAMENTOS SALVOS ===== */}
        {tela === "salvos" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#111" }}>Orçamentos salvos</div>
              <div style={{ color: "#888", fontSize: 14, marginTop: 4 }}>{orcamentos.length} orçamento{orcamentos.length !== 1 ? "s" : ""}</div>
            </div>
            {orcamentos.length === 0 ? (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E8E8", padding: "40px 20px", textAlign: "center" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>📁</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: "#333", marginBottom: 8 }}>Nenhum orçamento salvo</div>
                <div style={{ fontSize: 14, color: "#888", marginBottom: 20 }}>Crie um orçamento e toque em "💾 Salvar" para guardar aqui</div>
                <button onClick={() => setTela("form")} style={{ background: "#111", color: "#fff", border: "none", borderRadius: 12, padding: "13px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>+ Criar orçamento</button>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {orcamentos.map(o => (
                  <div key={o.id} style={{ background: "#fff", borderRadius: 14, border: "1px solid #E8E8E8", overflow: "hidden" }}>
                    <div style={{ padding: "16px 16px 12px", cursor: "pointer" }} onClick={() => carregarOrcamento(o)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontSize: 16, fontWeight: 700, color: "#111" }}>{o.cliente || "Cliente não informado"}</div>
                          <div style={{ fontSize: 13, color: "#888", marginTop: 3 }}>{o.endereco || "Endereço não informado"}</div>
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 12 }}>
                          <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 18, color: "#1a3a5c" }}>
                            {brl(o.itens.reduce((s,i) => s + ((parseFloat(i.valor)||0)*(parseInt(i.qtd)||1)), 0))}
                          </div>
                          <div style={{ fontSize: 11, color: "#bbb", marginTop: 2 }}>{o.criadoEm}</div>
                        </div>
                      </div>
                      <div style={{ marginTop: 8, fontSize: 12, color: "#aaa" }}>{o.itens.length} item{o.itens.length !== 1 ? "s" : ""} · Toque para editar</div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", borderTop: "1px solid #F5F5F5" }}>
                      <button onClick={() => carregarOrcamento(o)} style={{ padding: "12px", background: "none", border: "none", borderRight: "1px solid #F5F5F5", fontSize: 13, fontWeight: 600, cursor: "pointer", color: "#1a3a5c" }}>✏️ Editar</button>
                      <button onClick={() => excluirOrcamento(o.id)} style={{ padding: "12px", background: "none", border: "none", fontSize: 13, fontWeight: 600, cursor: "pointer", color: "#FF3B30" }}>🗑️ Excluir</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ===== TELA: FORMULÁRIO ===== */}
        {tela === "form" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
              <div>
                <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#111" }}>Novo orçamento</div>
                <div style={{ color: "#888", fontSize: 14, marginTop: 4 }}>{hojeStr()}</div>
              </div>
              <button onClick={salvarOrcamento} style={{ background: "#1a3a5c", color: "#fff", border: "none", borderRadius: 10, padding: "9px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>💾 Salvar</button>
            </div>

            {/* CLIENTE */}
            <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E8E8", overflow: "hidden" }}>
              <div style={{ padding: "14px 18px", borderBottom: "1px solid #F0F0F0" }}><span style={{ fontSize: 13, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.08em" }}>Cliente</span></div>
              <div style={{ padding: 18, display: "flex", flexDirection: "column", gap: 12 }}>
                {[{label:"Nome do cliente",key:"cliente",ph:"Ex: João da Silva"},{label:"Endereço / local",key:"endereco",ph:"Ex: Rua das Flores, 123"}].map(f => (
                  <div key={f.key}>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>{f.label}</label>
                    <input value={orc[f.key]} onChange={e => setOrc(o => ({...o, [f.key]: e.target.value}))} placeholder={f.ph} style={inp} />
                  </div>
                ))}
                <div>
                  <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>Descrição do serviço</label>
                  <textarea value={orc.descricao} onChange={e => setOrc(o => ({...o, descricao: e.target.value}))} placeholder="Ex: Pintura completa, 2 demãos..." rows={3} style={{ ...inp, resize: "none", lineHeight: 1.6 }} />
                </div>
                <div>
                  <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>Validade (dias)</label>
                  <input type="number" value={orc.validade} onChange={e => setOrc(o => ({...o, validade: e.target.value}))} placeholder="15" style={{ ...inp, width: 120 }} />
                </div>
              </div>
            </div>

            {/* INCLUSO */}
            <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E8E8", overflow: "hidden" }}>
              <div style={{ padding: "14px 18px", borderBottom: "1px solid #F0F0F0" }}><span style={{ fontSize: 13, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.08em" }}>O que está incluso</span></div>
              <div style={{ padding: "0 18px" }}>
                {[{label:"Material",key:"inclMaterial"},{label:"Mão de obra",key:"inclMao"},{label:"Nota fiscal",key:"inclNF"}].map((item, i, arr) => (
                  <div key={item.key} onClick={() => setOrc(o => ({...o, [item.key]: !o[item.key]}))} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "15px 0", cursor: "pointer", borderBottom: i < arr.length - 1 ? "1px solid #F0F0F0" : "none" }}>
                    <span style={{ fontSize: 15, fontWeight: 500 }}>{item.label}</span>
                    <div style={{ width: 48, height: 28, borderRadius: 100, background: orc[item.key] ? "#111" : "#E0E0E0", position: "relative", transition: "background 0.2s", flexShrink: 0 }}>
                      <div style={{ position: "absolute", top: 4, left: orc[item.key] ? 24 : 4, width: 20, height: 20, borderRadius: "50%", background: "#fff", transition: "left 0.2s", boxShadow: "0 1px 4px rgba(0,0,0,0.2)" }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* ITENS */}
            <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E8E8", overflow: "hidden" }}>
              <div style={{ padding: "14px 18px", borderBottom: "1px solid #F0F0F0" }}><span style={{ fontSize: 13, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.08em" }}>Itens {orc.itens.length > 0 ? `(${orc.itens.length})` : ""}</span></div>
              <div style={{ padding: 18 }}>
                <div style={{ position: "relative", marginBottom: orc.itens.length > 0 ? 16 : 0 }}>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input value={busca} onChange={e => { setBusca(e.target.value); setShowSug(true); }} onFocus={() => setShowSug(true)} placeholder="Quarto, Sala, Fachada..." style={{ ...inp, flex: 1 }} />
                    <button onClick={() => { if (busca.trim()) addItem(busca.trim()); }} style={{ background: "#111", color: "#fff", border: "none", borderRadius: 12, padding: "0 18px", fontSize: 22, cursor: "pointer", flexShrink: 0 }}>+</button>
                  </div>
                  {showSug && (
                    <div style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#fff", borderRadius: 14, border: "1px solid #E8E8E8", boxShadow: "0 8px 32px rgba(0,0,0,0.12)", zIndex: 50, overflow: "hidden", maxHeight: 260, overflowY: "auto" }}>
                      <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 12px 4px" }}>
                        <button onClick={() => setShowSug(false)} style={{ background: "none", border: "none", color: "#999", fontSize: 20, cursor: "pointer" }}>×</button>
                      </div>
                      {grupos.map(grupo => (
                        <div key={grupo}>
                          <div style={{ padding: "6px 16px 4px", fontSize: 11, fontWeight: 700, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em" }}>{grupo}</div>
                          {sugestoes.filter(s => s.grupo === grupo).map(s => (
                            <button key={s.label} onClick={() => addItem(s.label)} style={{ display: "block", width: "100%", padding: "12px 16px", background: "none", border: "none", textAlign: "left", fontSize: 15, color: "#111", cursor: "pointer", fontWeight: 500, borderTop: "1px solid #F5F5F5" }}>{s.label}</button>
                          ))}
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {orc.itens.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "24px 0", color: "#bbb", fontSize: 14 }}>Nenhum item adicionado ainda</div>
                ) : (
                  <div>
                    {/* Cabeçalho da tabela */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 60px 90px 30px", gap: 8, padding: "6px 0", borderBottom: "2px solid #111", marginBottom: 4 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em" }}>Descrição</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", textAlign: "center" }}>Qtd</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", textAlign: "right" }}>Valor R$</div>
                      <div></div>
                    </div>
                    {orc.itens.map((item, i) => (
                      <div key={item.id} style={{ display: "grid", gridTemplateColumns: "1fr 60px 90px 30px", gap: 8, alignItems: "center", padding: "8px 0", borderBottom: i < orc.itens.length - 1 ? "1px solid #F5F5F5" : "none" }}>
                        <input value={item.descricao} onChange={e => updateItem(item.id, "descricao", e.target.value)} style={{ border: "none", background: "transparent", fontSize: 14, fontWeight: 500, color: "#111", padding: "2px 0" }} />
                        <input type="number" value={item.qtd} onChange={e => updateItem(item.id, "qtd", e.target.value)} min="1" style={{ border: "1px solid #E8E8E8", background: "#F9F9F9", borderRadius: 8, fontSize: 14, fontWeight: 600, color: "#111", textAlign: "center", padding: "6px 4px", width: "100%" }} />
                        <input type="number" value={item.valor} onChange={e => updateItem(item.id, "valor", e.target.value)} placeholder="0" style={{ border: "1px solid #E8E8E8", background: "#F9F9F9", borderRadius: 8, fontSize: 14, fontWeight: 600, color: "#111", textAlign: "right", padding: "6px 8px", width: "100%" }} />
                        <button onClick={() => removeItem(item.id)} style={{ background: "none", border: "none", color: "#CCC", fontSize: 20, cursor: "pointer", padding: 0, lineHeight: 1 }}>×</button>
                      </div>
                    ))}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16, paddingTop: 16, borderTop: "2px solid #111" }}>
                      <span style={{ fontSize: 14, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em" }}>Total</span>
                      <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#111" }}>{brl(total)}</span>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <button onClick={() => setTela("preview")} style={{ background: "#111", color: "#fff", border: "none", borderRadius: 14, padding: "17px", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
              Ver orçamento →
            </button>
          </div>
        )}

        {/* ===== TELA: PREVIEW ===== */}
        {tela === "preview" && (
          <div>
            <div id="orcamento-render" style={{ background: "#fff", fontFamily: "'DM Sans', sans-serif", border: "1px solid #ddd" }}>
              {/* Cabeçalho azul */}
              <div style={{ background: "linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 60%, #4a9fd4 100%)", padding: "22px 24px 18px", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", bottom: -1, left: 0, right: 0, height: 24, background: "#fff", borderRadius: "60% 60% 0 0 / 100% 100% 0 0" }} />
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", position: "relative" }}>
                  <div>
                    <div style={{ fontFamily: "'DM Serif Display', serif", color: "#fff", fontSize: 26, letterSpacing: "0.05em", marginBottom: 4 }}>ORÇAMENTO</div>
                    <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 12 }}>{pintor.nome || ""}</div>
                    {pintor.cpfCnpj && <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11, marginTop: 2 }}>{pintor.cpfCnpj}</div>}
                    <div style={{ display: "flex", gap: 14, marginTop: 6, flexWrap: "wrap" }}>
                      {pintor.telefone && <span style={{ color: "rgba(255,255,255,0.75)", fontSize: 11 }}>{pintor.telefone}</span>}
                      {pintor.email && <span style={{ color: "rgba(255,255,255,0.75)", fontSize: 11 }}>{pintor.email}</span>}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em" }}>Data</div>
                    <div style={{ color: "#fff", fontSize: 13, fontWeight: 600, marginTop: 2 }}>{hojeStr()}</div>
                    <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", marginTop: 8 }}>Válido até</div>
                    <div style={{ color: "#fff", fontSize: 13, fontWeight: 600, marginTop: 2 }}>{addDias(orc.validade)}</div>
                  </div>
                </div>
              </div>

              <div style={{ padding: "20px 24px 28px" }}>
                {/* Campos do cliente */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0, marginBottom: 20, border: "1px solid #ddd" }}>
                  {[
                    { label: "Cliente", value: orc.cliente },
                    { label: "Data", value: hojeStr() },
                    { label: "Endereço", value: orc.endereco },
                    { label: "Válido até", value: addDias(orc.validade) },
                    { label: "Referente a", value: orc.descricao, full: true },
                  ].map((f, i) => (
                    <div key={f.label} style={{ gridColumn: f.full ? "1 / -1" : "auto", borderBottom: "1px solid #ddd", borderRight: (!f.full && i % 2 === 0) ? "1px solid #ddd" : "none", padding: "8px 12px", minHeight: f.full ? 44 : 38 }}>
                      <div style={{ fontSize: 9, fontWeight: 700, color: "#1a3a5c", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 3 }}>{f.label}</div>
                      <div style={{ fontSize: 13, color: "#111", fontWeight: 500 }}>{f.value || ""}</div>
                    </div>
                  ))}
                  <div style={{ gridColumn: "1 / -1", padding: "8px 12px", minHeight: 38 }}>
                    <div style={{ fontSize: 9, fontWeight: 700, color: "#1a3a5c", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 5 }}>Incluso</div>
                    <div style={{ display: "flex", gap: 16 }}>
                      {[["Material", orc.inclMaterial], ["Mão de obra", orc.inclMao], ["Nota fiscal", orc.inclNF]].map(([l, v]) => (
                        <div key={l} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: v ? "#1a3a5c" : "#bbb" }}>
                          <div style={{ width: 14, height: 14, border: `1.5px solid ${v ? "#1a3a5c" : "#ccc"}`, borderRadius: 3, background: v ? "#1a3a5c" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            {v && <span style={{ color: "#fff", fontSize: 9, fontWeight: 700 }}>✓</span>}
                          </div>
                          <span style={{ fontWeight: v ? 600 : 400 }}>{l}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Tabela */}
                <table style={{ width: "100%", borderCollapse: "collapse", border: "1px solid #ddd" }}>
                  <thead>
                    <tr style={{ background: "linear-gradient(135deg, #1a3a5c, #2d6a9f)" }}>
                      <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "#fff", textTransform: "uppercase", letterSpacing: "0.1em", borderRight: "1px solid rgba(255,255,255,0.2)" }}>Descrição</th>
                      <th style={{ padding: "10px 12px", textAlign: "center", fontSize: 11, fontWeight: 700, color: "#fff", textTransform: "uppercase", letterSpacing: "0.1em", width: 50, borderRight: "1px solid rgba(255,255,255,0.2)" }}>Qtd</th>
                      <th style={{ padding: "10px 12px", textAlign: "right", fontSize: 11, fontWeight: 700, color: "#fff", textTransform: "uppercase", letterSpacing: "0.1em", width: 110 }}>Valor</th>
                    </tr>
                  </thead>
                  <tbody>
                    {orc.itens.length === 0
                      ? <tr><td colSpan={3} style={{ padding: "20px", textAlign: "center", color: "#bbb", fontSize: 13, borderBottom: "1px solid #ddd" }}>Nenhum item</td></tr>
                      : orc.itens.map((item, i) => (
                        <tr key={item.id} style={{ background: i % 2 === 0 ? "#fff" : "#f7f9fc" }}>
                          <td style={{ padding: "10px 12px", fontSize: 13, color: "#111", borderBottom: "1px solid #e8e8e8", borderRight: "1px solid #e8e8e8" }}>{item.descricao || "—"}</td>
                          <td style={{ padding: "10px 12px", fontSize: 13, color: "#555", textAlign: "center", borderBottom: "1px solid #e8e8e8", borderRight: "1px solid #e8e8e8" }}>{item.qtd || 1}</td>
                          <td style={{ padding: "10px 12px", fontSize: 13, fontWeight: 600, color: "#111", textAlign: "right", borderBottom: "1px solid #e8e8e8" }}>{brl((parseFloat(item.valor)||0) * (parseInt(item.qtd)||1))}</td>
                        </tr>
                      ))
                    }
                    {Array.from({ length: Math.max(0, 5 - orc.itens.length) }).map((_, i) => (
                      <tr key={"e"+i}>
                        <td style={{ padding: "10px 12px", borderBottom: "1px solid #e8e8e8", borderRight: "1px solid #e8e8e8", height: 36 }}></td>
                        <td style={{ padding: "10px 12px", borderBottom: "1px solid #e8e8e8", borderRight: "1px solid #e8e8e8" }}></td>
                        <td style={{ padding: "10px 12px", borderBottom: "1px solid #e8e8e8" }}></td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{ background: "#f0f4f8" }}>
                      <td colSpan={2} style={{ padding: "12px", fontSize: 13, fontWeight: 700, color: "#1a3a5c", textTransform: "uppercase", letterSpacing: "0.08em", borderTop: "2px solid #2d6a9f", borderRight: "1px solid #ddd" }}>Total Geral</td>
                      <td style={{ padding: "12px", textAlign: "right", borderTop: "2px solid #2d6a9f" }}>
                        <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: 20, color: "#1a3a5c", fontWeight: 700 }}>{brl(total)}</span>
                      </td>
                    </tr>
                  </tfoot>
                </table>

                {/* Assinaturas */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 40, marginTop: 40 }}>
                  {[{ label: "Contratante", nome: orc.cliente }, { label: "Prestador de Serviço", nome: pintor.nome }].map(a => (
                    <div key={a.label} style={{ textAlign: "center" }}>
                      <div style={{ borderTop: "1px solid #1a3a5c", paddingTop: 8, marginTop: 40 }} />
                      <div style={{ fontSize: 11, color: "#1a3a5c", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em" }}>{a.label}</div>
                      <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{a.nome || ""}</div>
                    </div>
                  ))}
                </div>

                <div style={{ marginTop: 24, paddingTop: 12, borderTop: "1px solid #eee", textAlign: "center", fontSize: 10, color: "#bbb" }}>
                  Orçamento gerado pelo PintorPRO • pintorpro.vercel.app
                </div>
              </div>
            </div>

            {/* Botões */}
            <div className="no-print" style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 16 }}>
              <button onClick={() => window.print()} style={{ background: "#1a3a5c", color: "#fff", border: "none", borderRadius: 14, padding: "17px", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>📄 Salvar como PDF</button>
              <button onClick={gerarImagem} disabled={gerando} style={{ background: "#fff", color: "#111", border: "1.5px solid #E0E0E0", borderRadius: 14, padding: "15px", fontSize: 15, fontWeight: 600, cursor: "pointer", opacity: gerando ? 0.6 : 1 }}>{gerando ? "Gerando..." : "📤 Gerar imagem (WhatsApp)"}</button>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setTela("form")} style={{ flex: 1, background: "#fff", color: "#111", border: "1.5px solid #E0E0E0", borderRadius: 12, padding: "14px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>← Editar</button>
                <button onClick={salvarOrcamento} style={{ flex: 1, background: "#f0f4f8", color: "#1a3a5c", border: "none", borderRadius: 12, padding: "14px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>💾 Salvar</button>
                <button onClick={novoOrcamento} style={{ flex: 1, background: "#F5F5F5", color: "#111", border: "none", borderRadius: 12, padding: "14px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>🆕 Novo</button>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
