<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PintorPRO</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PintorPRO" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: #F5F5F5; font-family: 'DM Sans', sans-serif; color: #111; }
    input, textarea, select { font-family: 'DM Sans', sans-serif; }
    input:focus, textarea:focus { outline: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef } = React;

const PINTOR_KEY = "pintorpro_v3_pintor";
const PINTOR_VAZIO = { nome: "", cpfCnpj: "", telefone: "", email: "" };

const AMBIENTES = [
  { label: "Quarto", grupo: "Casa" },
  { label: "Sala", grupo: "Casa" },
  { label: "Cozinha", grupo: "Casa" },
  { label: "Banheiro", grupo: "Casa" },
  { label: "Área de Serviço", grupo: "Casa" },
  { label: "Garagem", grupo: "Casa" },
  { label: "Varanda", grupo: "Casa" },
  { label: "Corredor", grupo: "Casa" },
  { label: "Escada", grupo: "Casa" },
  { label: "Fachada", grupo: "Externo" },
  { label: "Portão", grupo: "Externo" },
  { label: "Muro", grupo: "Externo" },
  { label: "Galpão", grupo: "Industrial" },
  { label: "Piso Industrial", grupo: "Industrial" },
  { label: "Estrutura Metálica", grupo: "Industrial" },
  { label: "Telhado", grupo: "Industrial" },
  { label: "Parede Externa", grupo: "Industrial" },
];

let seq = 1;
const uid = () => seq++;
const brl = v => Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const hoje = () => new Date().toLocaleDateString("pt-BR");
const addDias = (n) => {
  const d = new Date();
  d.setDate(d.getDate() + (parseInt(n)||15));
  return d.toLocaleDateString("pt-BR");
};

function App() {
  // Pintor
  const [pintor, setPintor] = useState(() => {
    try { return JSON.parse(localStorage.getItem(PINTOR_KEY)) || PINTOR_VAZIO; } catch { return PINTOR_VAZIO; }
  });
  const [pintorSalvo, setPintorSalvo] = useState(() => !!localStorage.getItem(PINTOR_KEY));
  const [editPintor, setEditPintor] = useState(() => !localStorage.getItem(PINTOR_KEY));
  const [pintorTemp, setPintorTemp] = useState(pintor);

  // Orçamento
  const [cliente, setCliente] = useState("");
  const [endereco, setEndereco] = useState("");
  const [descricao, setDescricao] = useState("");
  const [validade, setValidade] = useState("15");
  const [inclMaterial, setInclMaterial] = useState(true);
  const [inclMao, setInclMao] = useState(true);
  const [inclNF, setInclNF] = useState(false);
  const [itens, setItens] = useState([]);
  const [busca, setBusca] = useState("");
  const [showSug, setShowSug] = useState(false);

  // UI
  const [tela, setTela] = useState("form"); // form | preview | pintor
  const [toast, setToast] = useState(null);
  const [imgUrl, setImgUrl] = useState(null);
  const [gerando, setGerando] = useState(false);

  const total = itens.reduce((s,i) => s + (parseFloat(i.valor)||0), 0);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const salvarPintor = () => {
    localStorage.setItem(PINTOR_KEY, JSON.stringify(pintorTemp));
    setPintor(pintorTemp); setPintorSalvo(true); setEditPintor(false);
    showToast("Dados salvos ✓");
    if (tela === "pintor") setTela("form");
  };

  const limparPintor = () => {
    if (!confirm("Remover seus dados salvos?")) return;
    localStorage.removeItem(PINTOR_KEY);
    setPintor(PINTOR_VAZIO); setPintorTemp(PINTOR_VAZIO);
    setPintorSalvo(false); setEditPintor(true);
    showToast("Dados removidos");
  };

  const addItem = (label) => {
    setItens(p => [...p, { id: uid(), descricao: label, valor: "" }]);
    setBusca(""); setShowSug(false);
  };

  const novoOrcamento = () => {
    setCliente(""); setEndereco(""); setDescricao(""); setItens([]);
    setValidade("15"); setInclMaterial(true); setInclMao(true); setInclNF(false);
    setTela("form"); setImgUrl(null);
    showToast("Novo orçamento ✓");
  };

  const gerarImagem = async () => {
    setGerando(true);
    showToast("Gerando imagem...");
    try {
      const el = document.getElementById("orcamento-render");
      const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#fff", useCORS: true });
      setImgUrl(canvas.toDataURL("image/jpeg", 0.97));
      showToast("Pronto! Segure a imagem para salvar ✓");
    } catch(e) {
      showToast("Erro ao gerar imagem");
    }
    setGerando(false);
  };

  const sugestoes = AMBIENTES.filter(a =>
    busca === "" || a.label.toLowerCase().includes(busca.toLowerCase())
  );

  const grupos = [...new Set(sugestoes.map(a => a.grupo))];

  return (
    <div style={{ minHeight: "100vh", background: "#F5F5F5" }}>

      {/* TOAST */}
      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "#111", color: "#fff", padding: "12px 22px", borderRadius: 100,
          fontSize: 14, fontWeight: 500, zIndex: 9999, whiteSpace: "nowrap",
          boxShadow: "0 4px 24px rgba(0,0,0,0.2)"
        }}>{toast}</div>
      )}

      {/* MODAL IMAGEM */}
      {imgUrl && (
        <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 9000, display: "flex", flexDirection: "column" }}>
          <div style={{ background: "#111", padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 16 }}>Orçamento gerado</div>
              <div style={{ color: "#888", fontSize: 12, marginTop: 2 }}>Segure a imagem → Salvar</div>
            </div>
            <button onClick={() => setImgUrl(null)} style={{ background: "#222", border: "none", color: "#fff", width: 36, height: 36, borderRadius: 10, fontSize: 20, cursor: "pointer" }}>×</button>
          </div>
          <div style={{ background: "#fff", padding: "10px 16px", display: "flex", gap: 10 }}>
            <a href={`https://wa.me/?text=Orçamento de pintura`}
              style={{ flex: 1, background: "#25D366", color: "#fff", borderRadius: 10, padding: "11px", fontSize: 14, fontWeight: 700, textAlign: "center", textDecoration: "none", display: "block" }}>
              💬 Enviar no WhatsApp
            </a>
            <button onClick={() => setImgUrl(null)} style={{ flex: 1, background: "#111", color: "#fff", border: "none", borderRadius: 10, padding: "11px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
              ← Voltar
            </button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
            <img src={imgUrl} alt="Orçamento" style={{ width: "100%", borderRadius: 8, display: "block" }} />
            <div style={{ textAlign: "center", marginTop: 12, color: "#666", fontSize: 13 }}>
              👆 Segure a imagem acima e toque em "Salvar imagem"
            </div>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div className="no-print" style={{ background: "#111", padding: "0 20px", display: "flex", justifyContent: "space-between", alignItems: "center", height: 56, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 20 }}>🖌️</span>
          <span style={{ fontFamily: "'DM Serif Display', serif", color: "#fff", fontSize: 20, letterSpacing: "-0.3px" }}>PintorPRO</span>
        </div>
        <button onClick={() => setTela(tela === "pintor" ? "form" : "pintor")} style={{
          background: tela === "pintor" ? "#fff" : "transparent",
          color: tela === "pintor" ? "#111" : "#888",
          border: "1px solid #333", borderRadius: 8,
          padding: "6px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer"
        }}>
          {pintorSalvo ? "👷 Meus dados" : "⚙️ Configurar"}
        </button>
      </div>

      <div style={{ maxWidth: 600, margin: "0 auto", padding: "20px 16px 100px" }}>

        {/* ===== TELA: DADOS DO PINTOR ===== */}
        {tela === "pintor" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#111" }}>Seus dados</div>
              <div style={{ color: "#888", fontSize: 14, marginTop: 4 }}>Salvos uma vez, usados em todos os orçamentos</div>
            </div>

            {pintorSalvo && !editPintor ? (
              <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E8E8", overflow: "hidden" }}>
                <div style={{ padding: "20px 20px 0" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "#111", marginBottom: 4 }}>{pintor.nome || "—"}</div>
                  <div style={{ color: "#666", fontSize: 14, marginBottom: 16 }}>{pintor.cpfCnpj || ""}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, paddingBottom: 20, borderBottom: "1px solid #F0F0F0" }}>
                    <div>
                      <div style={{ fontSize: 11, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>Telefone</div>
                      <div style={{ fontSize: 15, fontWeight: 600 }}>{pintor.telefone || "—"}</div>
                    </div>
                    <div>
                      <div style={{ fontSize: 11, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>E-mail</div>
                      <div style={{ fontSize: 14, fontWeight: 500, wordBreak: "break-all" }}>{pintor.email || "—"}</div>
                    </div>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0 }}>
                  <button onClick={() => { setPintorTemp(pintor); setEditPintor(true); }} style={{ padding: "16px", background: "none", border: "none", borderRight: "1px solid #F0F0F0", fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#111" }}>✏️ Editar</button>
                  <button onClick={limparPintor} style={{ padding: "16px", background: "none", border: "none", fontSize: 14, fontWeight: 600, cursor: "pointer", color: "#FF3B30" }}>🗑️ Apagar</button>
                </div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {[
                  { label: "Nome ou empresa", key: "nome", placeholder: "Carlos Silva Pinturas" },
                  { label: "CPF ou CNPJ", key: "cpfCnpj", placeholder: "000.000.000-00" },
                  { label: "WhatsApp / Telefone", key: "telefone", placeholder: "(11) 99999-9999" },
                  { label: "E-mail (opcional)", key: "email", placeholder: "seu@email.com" },
                ].map(f => (
                  <div key={f.key}>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#666", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>{f.label}</label>
                    <input
                      value={pintorTemp[f.key]}
                      onChange={e => setPintorTemp({...pintorTemp, [f.key]: e.target.value})}
                      placeholder={f.placeholder}
                      style={{ width: "100%", padding: "14px 16px", borderRadius: 12, border: "1.5px solid #E0E0E0", fontSize: 15, background: "#fff", color: "#111" }}
                    />
                  </div>
                ))}
                <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                  <button onClick={salvarPintor} style={{ flex: 1, background: "#111", color: "#fff", border: "none", borderRadius: 12, padding: "15px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>Salvar dados</button>
                  {pintorSalvo && <button onClick={() => setEditPintor(false)} style={{ flex: 1, background: "#fff", color: "#111", border: "1.5px solid #E0E0E0", borderRadius: 12, padding: "15px", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>Cancelar</button>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ===== TELA: FORMULÁRIO ===== */}
        {tela === "form" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>

            <div>
              <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#111" }}>Novo orçamento</div>
              <div style={{ color: "#888", fontSize: 14, marginTop: 4 }}>{hoje()}</div>
            </div>

            {/* CLIENTE */}
            <Card titulo="Cliente">
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <Campo label="Nome do cliente">
                  <input value={cliente} onChange={e => setCliente(e.target.value)} placeholder="Ex: João da Silva" style={inp} />
                </Campo>
                <Campo label="Endereço / local">
                  <input value={endereco} onChange={e => setEndereco(e.target.value)} placeholder="Ex: Rua das Flores, 123" style={inp} />
                </Campo>
                <Campo label="Descrição do serviço">
                  <textarea value={descricao} onChange={e => setDescricao(e.target.value)} placeholder="Ex: Pintura completa de apartamento, 2 demãos..." rows={3} style={{ ...inp, resize: "none", lineHeight: 1.6 }} />
                </Campo>
                <Campo label="Validade do orçamento (dias)">
                  <input type="number" value={validade} onChange={e => setValidade(e.target.value)} placeholder="15" style={{ ...inp, width: 120 }} />
                </Campo>
              </div>
            </Card>

            {/* INCLUSO */}
            <Card titulo="O que está incluso">
              <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                {[
                  { label: "Material", val: inclMaterial, set: setInclMaterial },
                  { label: "Mão de obra", val: inclMao, set: setInclMao },
                  { label: "Nota fiscal", val: inclNF, set: setInclNF },
                ].map((item, i, arr) => (
                  <div key={item.label} onClick={() => item.set(!item.val)} style={{
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    padding: "15px 0", cursor: "pointer",
                    borderBottom: i < arr.length - 1 ? "1px solid #F0F0F0" : "none"
                  }}>
                    <span style={{ fontSize: 15, fontWeight: 500, color: "#111" }}>{item.label}</span>
                    <div style={{
                      width: 48, height: 28, borderRadius: 100,
                      background: item.val ? "#111" : "#E0E0E0",
                      position: "relative", transition: "background 0.2s"
                    }}>
                      <div style={{
                        position: "absolute", top: 4, left: item.val ? 24 : 4,
                        width: 20, height: 20, borderRadius: "50%", background: "#fff",
                        transition: "left 0.2s", boxShadow: "0 1px 4px rgba(0,0,0,0.2)"
                      }} />
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            {/* ITENS */}
            <Card titulo={`Itens ${itens.length > 0 ? `(${itens.length})` : ""}`}>
              <div style={{ position: "relative", marginBottom: itens.length > 0 ? 16 : 0 }}>
                <div style={{ display: "flex", gap: 8 }}>
                  <input
                    value={busca}
                    onChange={e => { setBusca(e.target.value); setShowSug(true); }}
                    onFocus={() => setShowSug(true)}
                    placeholder="Quarto, Sala, Fachada..."
                    style={{ ...inp, flex: 1 }}
                  />
                  <button onClick={() => { if (busca.trim()) addItem(busca.trim()); }} style={{ background: "#111", color: "#fff", border: "none", borderRadius: 12, padding: "0 18px", fontSize: 22, cursor: "pointer", fontWeight: 300, flexShrink: 0 }}>+</button>
                </div>

                {showSug && (
                  <div style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#fff", borderRadius: 14, border: "1px solid #E8E8E8", boxShadow: "0 8px 32px rgba(0,0,0,0.12)", zIndex: 50, overflow: "hidden", maxHeight: 260, overflowY: "auto" }}>
                    <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 12px 4px" }}>
                      <button onClick={() => setShowSug(false)} style={{ background: "none", border: "none", color: "#999", fontSize: 20, cursor: "pointer" }}>×</button>
                    </div>
                    {grupos.map(grupo => (
                      <div key={grupo}>
                        <div style={{ padding: "6px 16px 4px", fontSize: 11, fontWeight: 700, color: "#999", textTransform: "uppercase", letterSpacing: "0.1em" }}>{grupo}</div>
                        {sugestoes.filter(s => s.grupo === grupo).map(s => (
                          <button key={s.label} onClick={() => addItem(s.label)} style={{
                            display: "block", width: "100%", padding: "12px 16px",
                            background: "none", border: "none", textAlign: "left",
                            fontSize: 15, color: "#111", cursor: "pointer", fontWeight: 500,
                            borderTop: "1px solid #F5F5F5"
                          }}>{s.label}</button>
                        ))}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {itens.length === 0 ? (
                <div style={{ textAlign: "center", padding: "24px 0", color: "#bbb", fontSize: 14 }}>
                  Nenhum item adicionado ainda
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                  {itens.map((item, i) => (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: i < itens.length - 1 ? "1px solid #F5F5F5" : "none" }}>
                      <input
                        value={item.descricao}
                        onChange={e => setItens(p => p.map(it => it.id === item.id ? {...it, descricao: e.target.value} : it))}
                        style={{ flex: 1, border: "none", background: "transparent", fontSize: 15, fontWeight: 500, color: "#111", padding: "4px 0" }}
                      />
                      <div style={{ display: "flex", alignItems: "center", gap: 4, background: "#F5F5F5", borderRadius: 8, padding: "6px 10px" }}>
                        <span style={{ fontSize: 12, color: "#888" }}>R$</span>
                        <input
                          type="number"
                          value={item.valor}
                          onChange={e => setItens(p => p.map(it => it.id === item.id ? {...it, valor: e.target.value} : it))}
                          placeholder="0"
                          style={{ border: "none", background: "transparent", fontSize: 15, fontWeight: 600, width: 80, textAlign: "right", color: "#111" }}
                        />
                      </div>
                      <button onClick={() => setItens(p => p.filter(it => it.id !== item.id))} style={{ background: "none", border: "none", color: "#CCC", fontSize: 20, cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
                    </div>
                  ))}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 16, paddingTop: 16, borderTop: "2px solid #111" }}>
                    <span style={{ fontSize: 14, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em" }}>Total</span>
                    <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#111" }}>{brl(total)}</span>
                  </div>
                </div>
              )}
            </Card>

            <button onClick={() => setTela("preview")} style={{ background: "#111", color: "#fff", border: "none", borderRadius: 14, padding: "17px", fontSize: 16, fontWeight: 700, cursor: "pointer" }}>
              Ver orçamento →
            </button>

          </div>
        )}

        {/* ===== TELA: PREVIEW ===== */}
        {tela === "preview" && (
          <div>
            {/* Orçamento renderizável */}
            <div id="orcamento-render" style={{ background: "#fff", borderRadius: 16, overflow: "hidden", border: "1px solid #E8E8E8" }}>

              {/* Cabeçalho */}
              <div style={{ background: "#111", padding: "24px 24px 20px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16 }}>
                  <div>
                    <div style={{ color: "#888", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 6 }}>🖌️ PintorPRO</div>
                    <div style={{ fontFamily: "'DM Serif Display', serif", color: "#fff", fontSize: 22, lineHeight: 1.2 }}>{pintor.nome || "Orçamento de Pintura"}</div>
                    {pintor.cpfCnpj && <div style={{ color: "#888", fontSize: 12, marginTop: 4 }}>{pintor.cpfCnpj}</div>}
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 14, marginTop: 10 }}>
                      {pintor.telefone && <span style={{ color: "#aaa", fontSize: 13 }}>📱 {pintor.telefone}</span>}
                      {pintor.email && <span style={{ color: "#aaa", fontSize: 13 }}>✉️ {pintor.email}</span>}
                    </div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 10, color: "#666", textTransform: "uppercase", letterSpacing: "0.1em" }}>Emitido</div>
                    <div style={{ color: "#fff", fontSize: 13, fontWeight: 600, marginTop: 2 }}>{hoje()}</div>
                    <div style={{ fontSize: 10, color: "#666", textTransform: "uppercase", letterSpacing: "0.1em", marginTop: 8 }}>Válido até</div>
                    <div style={{ color: "#fff", fontSize: 13, fontWeight: 600, marginTop: 2 }}>{addDias(validade)}</div>
                  </div>
                </div>
              </div>

              <div style={{ padding: "24px", display: "flex", flexDirection: "column", gap: 22 }}>

                {/* Dados cliente */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                  <div>
                    <div style={{ fontSize: 10, color: "#999", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4 }}>Cliente</div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: "#111" }}>{cliente || "—"}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, color: "#999", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4 }}>Local</div>
                    <div style={{ fontSize: 14, color: "#333" }}>{endereco || "—"}</div>
                  </div>
                  {descricao && (
                    <div style={{ gridColumn: "1 / -1" }}>
                      <div style={{ fontSize: 10, color: "#999", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4 }}>Serviço</div>
                      <div style={{ fontSize: 14, color: "#333", lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{descricao}</div>
                    </div>
                  )}
                </div>

                {/* Incluso */}
                <div>
                  <div style={{ fontSize: 10, color: "#999", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 8 }}>Incluso</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {inclMaterial && <Pill>✓ Material</Pill>}
                    {inclMao && <Pill>✓ Mão de obra</Pill>}
                    {inclNF && <Pill>✓ Nota fiscal</Pill>}
                    {!inclMaterial && <Pill light>Sem material</Pill>}
                    {!inclMao && <Pill light>Sem mão de obra</Pill>}
                    {!inclNF && <Pill light>Sem nota fiscal</Pill>}
                  </div>
                </div>

                {/* Itens */}
                <div>
                  <div style={{ fontSize: 10, color: "#999", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 10 }}>Itens</div>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead>
                      <tr style={{ borderBottom: "2px solid #111" }}>
                        <th style={{ textAlign: "left", padding: "8px 0", fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "0.08em" }}>Descrição</th>
                        <th style={{ textAlign: "right", padding: "8px 0", fontSize: 11, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "0.08em", width: 120 }}>Valor</th>
                      </tr>
                    </thead>
                    <tbody>
                      {itens.length === 0
                        ? <tr><td colSpan={2} style={{ padding: "20px 0", textAlign: "center", color: "#bbb", fontSize: 14 }}>Nenhum item</td></tr>
                        : itens.map((item, i) => (
                          <tr key={item.id} style={{ borderBottom: "1px solid #F0F0F0" }}>
                            <td style={{ padding: "12px 0", fontSize: 14, color: "#111" }}>{item.descricao || "—"}</td>
                            <td style={{ padding: "12px 0", fontSize: 14, fontWeight: 600, color: "#111", textAlign: "right" }}>{brl(item.valor)}</td>
                          </tr>
                        ))
                      }
                    </tbody>
                    <tfoot>
                      <tr style={{ borderTop: "2px solid #111" }}>
                        <td style={{ padding: "14px 0", fontSize: 13, fontWeight: 700, color: "#666", textTransform: "uppercase", letterSpacing: "0.08em" }}>Total</td>
                        <td style={{ padding: "14px 0", textAlign: "right" }}>
                          <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: 22, color: "#111" }}>{brl(total)}</span>
                        </td>
                      </tr>
                    </tfoot>
                  </table>
                </div>

                {/* Assinaturas */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32, marginTop: 12 }}>
                  {[{ label: "Contratante", nome: cliente }, { label: "Prestador", nome: pintor.nome }].map(a => (
                    <div key={a.label} style={{ textAlign: "center" }}>
                      <div style={{ borderTop: "1.5px solid #111", paddingTop: 8, marginTop: 40 }} />
                      <div style={{ fontSize: 12, color: "#666" }}>{a.label}</div>
                      <div style={{ fontSize: 11, color: "#999", marginTop: 2 }}>{a.nome || ""}</div>
                    </div>
                  ))}
                </div>

              </div>
            </div>

            {/* Botões */}
            <div className="no-print" style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 16 }}>
              <button
                onClick={() => window.print()}
                style={{ background: "#111", color: "#fff", border: "none", borderRadius: 14, padding: "17px", fontSize: 16, fontWeight: 700, cursor: "pointer" }}
              >
                📄 Salvar como PDF
              </button>
              <button
                onClick={gerarImagem}
                disabled={gerando}
                style={{ background: "#fff", color: "#111", border: "1.5px solid #E0E0E0", borderRadius: 14, padding: "15px", fontSize: 15, fontWeight: 600, cursor: "pointer", opacity: gerando ? 0.6 : 1 }}
              >
                {gerando ? "Gerando..." : "📤 Gerar imagem (WhatsApp)"}
              </button>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setTela("form")} style={{ flex: 1, background: "#fff", color: "#111", border: "1.5px solid #E0E0E0", borderRadius: 12, padding: "14px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>← Editar</button>
                <button onClick={novoOrcamento} style={{ flex: 1, background: "#F5F5F5", color: "#111", border: "none", borderRadius: 12, padding: "14px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>🆕 Novo</button>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// Componentes auxiliares
const inp = {
  width: "100%", padding: "13px 15px", borderRadius: 12,
  border: "1.5px solid #E8E8E8", fontSize: 15, background: "#fff", color: "#111"
};

function Card({ titulo, children }) {
  return (
    <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E8E8E8", overflow: "hidden" }}>
      <div style={{ padding: "14px 18px", borderBottom: "1px solid #F0F0F0" }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: "#111", textTransform: "uppercase", letterSpacing: "0.08em" }}>{titulo}</span>
      </div>
      <div style={{ padding: "18px" }}>{children}</div>
    </div>
  );
}

function Campo({ label, children }) {
  return (
    <div>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>{label}</label>
      {children}
    </div>
  );
}

function Pill({ children, light }) {
  return (
    <span style={{
      padding: "5px 12px", borderRadius: 100, fontSize: 13, fontWeight: 600,
      background: light ? "#F5F5F5" : "#111",
      color: light ? "#bbb" : "#fff",
      border: light ? "1px solid #E8E8E8" : "none"
    }}>{children}</span>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
